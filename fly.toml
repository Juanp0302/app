app = "owl-compliance"
primary_region = "gru"

[build]

[env]
  NODE_ENV    = "production"
  PORT        = "3000"
  DB_PATH     = "/storage/db/owl.db"
  UPLOADS_DIR = "/storage/uploads"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source      = "owl_storage"
  destination = "/storage"
  initial_size = "3gb"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
